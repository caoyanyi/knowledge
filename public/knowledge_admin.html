<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知识库管理</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <div class="page">
    <h1>知识库管理</h1>

    <label>标题</label>
    <input id="title" placeholder="例如：退款政策">

    <label>来源</label>
    <input id="source" placeholder="例如：售后政策手册 / 人工录入" value="后台录入">

    <label>内容</label>
    <textarea id="content" placeholder="请输入知识库内容"></textarea>

    <button id="saveBtn">保存并同步到向量库</button>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <div class="admin-toolbar">
    <button id="refreshBtn" type="button">刷新列表</button>
    <button id="syncBtn" type="button">重新同步 Qdrant</button>
  </div>

  <div id="chunkList" class="chunk-list"></div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/knowledge-admin.js"></script>
</body>
</html>
